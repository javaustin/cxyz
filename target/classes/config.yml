# ============================================================
# API CONFIGURATION
# ============================================================
# Settings used to connect this server to the central network API.

api:

  identifier: "API" # Identifier used when this server authenticates with the API (case-sensitive)
  endpoint: http://localhost:5000 # Base URL of your backend API (e.g., http://localhost:5000).
  secret: "super-secret-key-1" # Your own secret key used to authenticate requests server to server. This value MUST match the key configured in the API.
  timeout-millis: 5000 # Maximum time (in milliseconds) to wait for an API response before cancelling the request.


# ============================================================
# SERVER IDENTIFICATION
# ============================================================
# Unique name for THIS server in your network.
# Must match the same name defined under "servers" below.
# Do NOT use spaces.
this-server: HUB-1


# ============================================================
# INTERNAL NETWORK PORT
# ============================================================
# Port used by this plugin to receive HTTP requests from other servers.
#
# IMPORTANT:
# - This is NOT your Minecraft server port (usually 25565)
# - Choose an unused port between 49152–65535
# - This port is only used for internal server communication
this-port: 59152


# ============================================================
# NETWORK SERVERS
# ============================================================
# List of servers that are part of this network.
# Each server must define:
#   ip-address → the HTTP endpoint for that server
#   secret     → authentication key shared with the API
#
# The port in the IP address should match the "this-port" value
# configured on the destination server.
servers:
  HUB-1:
    ip-address: "http://localhost:59152" # The IP address the API will send requests back to
    secret: "super-secret-key-2" # The servers' secret key. This value must match the secret for the same server in the API config.json file.

# NOTE: This plugin cannot alone send players to another server, you must have a proxy like BungeeCord, Velocity, set up.


# ============================================================
# SERVER TIME SETTINGS
# ============================================================
# Default timezone used by the plugin. Players can set individual timezones that override this.
# Format must follow IANA timezone naming:
# Example: America/Los_Angeles
timezone: America/Los_Angeles

# Format used when displaying dates and times.
# Formatting reference:
# https://docs.oracle.com/javase/8/docs/api/java/time/format/DateTimeFormatter.html
datetime-format: EEEE, MMMM d, yyyy, h:mma (z)
datetime-short-format: M/d/yy h:mma (z)


# ============================================================
# DEBUGGING
# ============================================================
# Enables additional logging for troubleshooting.
#
# Available options:
#  COSMETIC,
#  FRIEND_REQUEST,
#  GAME_STAT,
#  MAP,
#  MESSAGE_PARSER,
#  PARTY,
#  PLAYER_MESSAGE,
#  PUNISHMENT,
#  REQUESTS,
#  SHORTHAND_COMMANDS,
#  USER
#
# Leave empty [] to disable debugging.
debugger:
  enabled-values: []


# ============================================================
# NETWORK RANKS
# ============================================================
# Ranks stored in the central user database and shared across the network.
#
# Permissions automatically follow the format:
#   cxyz.rank.{rankName}
#
# Example:
#   cxyz.rank.vip
#
# WARNING:
# - Hierarchy is required and must be unique to the rank. Higher hierarchy values override lower ones.
# - A default rank is required and denoted by "default". If one is not provided in config this plugin will make one for you.
ranks:

  default:
    prefix: '&7'
    color: '&7'
    defaultChatColor: '&f'
    chat-cooldown: 3
    hierarchy: 0
  
  vip:
    prefix: '&f[&aVIP&f] '
    color: '&a'
    default-chat-color: '&f'
    chat-cooldown: 1
    hierarchy: 1
  
  mvp:
    prefix: '&f[&bMVP&f] '
    color: '&b'
    default-chat-color: '&f'
    chat-cooldown: 0
    hierarchy: 2
  
  mod:
    prefix: '&f[&eMod&f] '
    color: '&e'
    default-chat-color: '&f'
    chat-cooldown: 0
    hierarchy: 3
  
  admin:
    prefix: '&f[&cAdmin&f] '
    color: '&c'
    default-chat-color: '&f'
    chat-cooldown: 0
    hierarchy: 4


# ============================================================
# CHAT SYSTEM
# ============================================================
# Channels allow communication across all servers.
#
# Permissions required to use a channel:
#   cxyz.chat.{channel}
#
# Important rules:
# - Channel names must be unique
# - Channel names are NOT case-sensitive
# - Do NOT reuse trigger-prefix values
chat:

  # ----------------------------------------------------------
  # CORE CHANNELS
  # ----------------------------------------------------------
  # These are built-in system channels.
  # Do NOT add new ones here.

  # These channels are accessible by default. You can restrict players from using these channels by denying the permission "cxyz.channel.{name}".

  core-channels:

    all:
      prefix: '&ePUBLIC'
      read-only: false
      console: true
      ignorable: false
      webhook-url: ''
      chat-format: '[{player-tag}](HOVER:{player-tag-lore})[{player-rank-prefix}](HOVER:{player-custom-rankplate-lore}){player-rank-color}{player-display-name}: {player-chat-color}{message}'
      trigger-prefix: ""
      aliases: [public, pub, a]
      lockable: true
      locked: false

    party:
      prefix: '&9PARTY'
      read-only: false
      console: true
      ignorable: true
      webhook-url: ''
      chat-format: ''
      trigger-prefix: ""
      aliases: [p]
      lockable: true
      locked: false

    message:
      prefix: '&dMESSAGE'
      read-only: false
      console: true
      ignorable: true
      webhook-url: ''
      chat-format: ''
      trigger-prefix: ""
      aliases: [msg, m]
      lockable: true
      locked: false


  # ----------------------------------------------------------
  # CUSTOM CHANNELS
  # ----------------------------------------------------------
  # You may create additional private or staff channels here.

  # These channels are private by default. You can allow players to use these channels adding the permission "cxyz.channel.{name}".

  custom-channels:
    logs:
      chat-format: '{channel-prefix}&7{content}'
      console: true
      ignorable: true
      prefix: '&e[Logger] '
      read-only: true
      trigger-prefix: ''
      webhook-url: ''
      aliases: [ ]
      lockable: true
      locked: false

    staff:
      prefix: '&c[Staff] '
      read-only: false
      console: true
      ignorable: true
      webhook-url: ''
      chat-format: '{channel-prefix}{player-rank-color}{player-display-name}: &f{content}'
      trigger-prefix: '#'
      aliases: [ s ]
      lockable: true
      locked: false

    manager:
      prefix: '&4[Manager] '
      read-only: false
      console: true
      ignorable: true
      webhook-url: ''
      chat-format: '{channel-prefix}{player-rank-color}{player-display-name}: &f{content}'
      trigger-prefix: '$'
      aliases: [ m ]
      lockable: true
      locked: false

    announcement:
      prefix: '&6Announcement'
      read-only: true
      console: true
      ignorable: true
      webhook-url: ''
      chat-format: '{message}'
      trigger-prefix: ""
      aliases: [ ]
      lockable: true
      locked: false

  # ----------------------------------------------------------
  # DEFAULT CHANNEL MAPPINGS
  # ----------------------------------------------------------
  # Format: function -> channel
  #
  # Available functions:
  #
  # PUBLIC,
  # PARTY,
  # MESSAGE,
  # ANNOUNCEMENT,
  # PUNISHMENT,
  # XRAY,
  # ERRORS
  #
  defaults:
    announcement: announcement
    errors: logs
    punishment: staff
    xray: logs
    message: message
    party: party
    public: all

  # ----------------------------------------------------------
  # CHAT FILTER
  # ----------------------------------------------------------
  # Players with permission cxyz.chat-filter-bypass.{rule} will bypass the filter rule.

  chat-filter:
    enabled: true

    rules:
      example-rule:
        enabled-channels: [all]
        blacklisted-words: ["nigger", "faggot"]
        actions:
          - mute {player} 24h discriminatory language

      example-rule2:
        enabled-channels: [party]
        blacklisted-words: ["party"]
        actions:
          - show {player} &4no partying allowed


# ============================================================
# COLOR DEFINITIONS
# ============================================================
# Defines color names usable in plugin commands and configs.

colors:

  # Minecraft legacy colors
  black: "&0"
  dark_blue: "&1"
  dark_green: "&2"
  dark_aqua: "&3"
  dark_red: "&4"
  dark_purple: "&5"
  gold: "&6"
  gray: "&7"
  dark_gray: "&8"
  blue: "&9"
  green: "&a"
  aqua: "&b"
  red: "&c"
  light_purple: "&d"
  yellow: "&e"
  white: "&f"

  # Example custom color
  darker_green: "&x&2&f&a&5&2&b"


# ============================================================
# ANNOUNCEMENTS
# ============================================================
# Broadcast messages that appear across servers.

announcements:

  example-2:
    enabled: true
    content: '&3hecking is forbidden on the server {player}. &4do not heck.'
    delay: 1800
    interval: 3600
    servers:
      - HUB-1
    to-console: true


# ============================================================
# PARTY SYSTEM
# ============================================================
parties:
  enabled: true
  autokick-after: 300
  invites-expire-after: 60
  max-players: 10000


# ============================================================
# FRIEND SYSTEM
# ============================================================
friends:
  requests-expire-after: 300 # The amount of seconds to wait before a friend request to another player expires.


# ============================================================
# PUNISHMENT DEFAULTS
# ============================================================
punishments:
  defaults:
    
    reasons:
      warn: Bad Behavior
      mute: Chat Abuse
      kick: Unspecified
      ban: Hacking
    
    durations: # Enter times in SECONDS
      permanent: "permanent" # If the duration is permanent, this text will show instead of the supplied durations.

      effective-until: # The time until the punishment is no longer effective.
        warn: 604800 # 1 week (warns are stored but do not affect the player - to control records - modify the expiry value)
        mute: 3600 # 1 hour
        kick: 0 # Expires immediately (kicks are not persistent by design, any value will be ignored)
        ban: -1 # Permanent

      expire: # The time until the record of the punishment is cleared.
        warn: -1 # Record never expires
        mute: 2622600 # Record expires after a month of the issuing
        kick: 0 # Record expires immediately
        ban: -1 # Record never expires

  # Commands that are restricted from a player on a mute
  mute-restrictions:
  - msg
  - message
  - r
  - party chat


# ============================================================
# CUSTOM COMMAND SHORTHANDS
# ============================================================
shorthand-commands:
  sc:
    description: Enter the staff channel
    trigger: sc
    actions:
      - channel staff

  permban:
    description: Permanently ban a player from the server
    trigger: permban {player} {reason}
    actions:
      - ban {player} permanent {reason}

  rules:
    description: View the server rules
    trigger: rules
    actions:
      - "show {sender-username} &aHere are the rules for you {sender}:\n&c1. No hacking\n&62. No being frowny\n&e3. Have fun!"

  hi:
    description: Say hi!
    trigger: hi
    actions:
      - show {sender-username} Hello!

  buy:
    description: Buy a cosmetic from the shop
    trigger: buy {cosmetic}
    actions:
      - cosmetic buy {cosmetic}

  equip:
    description: Equip a cosmetic you own
    trigger: equip {owned-cosmetic}
    actions:
      - cosmetic equip {owned-cosmetic}

  unequip:
    description: Unequip a cosmetic you have equipped
    trigger: unequip {equipped-cosmetic}
    actions:
      - cosmetic unequip {equipped-cosmetic}

  lock:
    description: Lock a channel to stop all players from sending messages in it
    trigger: lock {channel}
    actions:
      - channel lock {channel}

  unlock:
    description: Unlock a channel
    trigger: unlock {locked-channel}
    actions:
      - channel unlock {locked-channel}


# ============================================================
# COMMAND ACCESS RESTRICTIONS
# ============================================================

# Adds rank/level restrictions to commands.
# Players must still have the normal command permission.

command-restrictions:

  chatcolor:
    minimum-rank: vip
    minimum-level: 0
    message: "&eYou may not use this unless you are a &f[[&aVIP&f]]&e!"